<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PPFD0FVEP6"></script>
  <script>
      window.dataLayer = window.dataLayer || [];

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المعهد العالي - شبكة كلّيات قُطرية</title>
  <link rel="icon" type="image/png" href="Favicon_Transparent.png" />

  <style>
    :root {
      --primary: #B92B31;
      --primary-dark: #B92B31;
      --accent: #B92B31;
      --bg: #f4f4f5;
      --text-main: #111827;
      --text-muted: #6b7280;
      --card-bg: #ffffff;
      --shadow-soft: 0 18px 40px rgba(15, 23, 42, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top,
        #B92B31 0%,
        #FBC23A 50%,
        #F8CBCB 100%
      );
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .card-wrapper {
      max-width: 480px;
      width: 100%;
      padding: 24px 16px 40px;
    }

    @media (min-width: 768px) {
      .card-wrapper {
        max-width: 720px;
      }
    }

    @media (min-width: 1024px) {
      .card-wrapper {
        max-width: 900px;
      }
    }

    .card {
      background: var(--card-bg);
      border-radius: 0;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      position: relative;
    }

/*
    .header-panel {
      height: 150px;
      background-image: url("Upper_Back.jpg");
      background-size: contain;
      background-position: center top;
      position: relative;
      background-repeat: no-repeat;
    }

    @media (min-width: 1024px) {
      .header-panel {
        height: 300px;
        background-position: center top;
      }
    }
*/
    .profile-pic-wrapper {
      position: absolute;
      top: 110px;
      left: 50%;
      transform: translateX(-50%);
    }

    @media (min-width: 1024px) {
      .profile-pic-wrapper {
        top: 270px;
      }
    }

    .profile-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }

    .profile-pic {
      width: 86%;
      height: 86%;
      object-fit: contain;
      border-radius: 50%;
    }

    .card-content {
      padding: 145px 24px 24px;
    }

    @media (min-width: 1024px) {
      .card-content {
        padding: 165px 24px 24px;
      }
    }

    .chat-header {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #ffffff;
      border-bottom: 1px solid #ececec;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      margin: -145px -24px 18px;
    }

    .back-arrow {
      text-decoration: none;
      color: var(--primary-dark);
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      padding: 4px 6px;
      flex: 0 0 auto;
    }

    .chat-header-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      flex: 1;
      text-align: right;
    }

    .chat-header-name {
      font-size: 1.08rem;
      font-weight: 700;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-header-college {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-header-avatar-wrap {
      flex: 0 0 auto;
    }

    .chat-header-avatar-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px rgba(0,0,0,0.14);
    }

    .chat-header-avatar {
      width: 84%;
      height: 84%;
      object-fit: contain;
      border-radius: 50%;
    }

    .chat-panel {
      background: #ffffff;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(255,255,255,0.7);
    }

    .chat-box {
      height: 58vh;
      min-height: 420px;
      max-height: 700px;
      padding: 18px;
      overflow-y: auto;
      background:
        linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)),
        url("Logo_Ar_Red.png") center center / 230px no-repeat;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      margin-bottom: 14px;
    }

    .message.user {
      justify-content: flex-start;
    }

    .message.bot {
      justify-content: flex-end;
    }

    .bubble {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 14px;
      max-width: 78%;
      word-wrap: break-word;
      line-height: 1.7;
      white-space: pre-wrap;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .user .bubble {
      background: #d1d5db;
      color: #111827;
      border-bottom-left-radius: 4px;
    }

    .bot .bubble {
      background: #B92B31;
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    .composer-area {
      padding: 14px;
      background: #fff;
      border-top: 1px solid #ececec;
    }

    .composer {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .composer input {
      flex: 1;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      text-align: right;
      background: #fff;
      color: var(--text-main);
    }

    .composer input:focus {
      border-color: var(--primary);
    }

    .composer button {
      padding: 14px 18px;
      border: none;
      border-radius: 4px;
      background: #FBC23A;
      color: #fff;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: 0.2s ease;
      min-width: 92px;
    }

    .composer button:hover {
      background: #e0aa33;
    }

    .composer button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 10px;
      min-height: 22px;
      text-align: center;
    }

    @media (max-width: 640px) {
      .profile-circle {
        width: 132px;
        height: 132px;
      }

      .card-content {
        padding: 125px 16px 18px;
      }

      .chat-header {
        margin: -125px -16px 16px;
        padding: 10px 12px;
      }

      .back-arrow {
        font-size: 24px;
      }

      .chat-header-avatar-circle {
        width: 46px;
        height: 46px;
      }

      .chat-header-name {
        font-size: 1rem;
      }

      .chat-header-college {
        font-size: 0.72rem;
      }

      .chat-box {
        min-height: 360px;
        height: 56vh;
        padding: 14px;
        background:
          linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.7)),
          url("Logo_Ar_Red.png") center center / 180px no-repeat;
      }

      .bubble {
        max-width: 86%;
      }

      .composer {
        flex-direction: column;
      }

      .composer button,
      .composer input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="card-wrapper">
    <div class="card">
      <!--
      <div class="header-panel">
        <div class="profile-pic-wrapper">
          <div class="profile-circle">
            <img src="logo.jpg" alt="كارينا" class="profile-pic" />
          </div>
        </div>
      </div> -->

      <div class="card-content">
        <div class="chat-header">
          <a class="back-arrow" href="main.html" aria-label="العودة">&#8594;</a>

          <div class="chat-header-avatar-wrap">
            <div class="chat-header-avatar-circle">
              <img src="Karina.png" alt="كارينا" class="chat-header-avatar" />
            </div>
          </div>

          <div class="chat-header-info">
            <div class="chat-header-name">كارينا</div>
            <div class="chat-header-college">المعهد العالي - شبكة كليات قطرية</div>
          </div>

        </div>

        <div class="chat-panel">
          <div id="chatBox" class="chat-box">
            <div class="message bot">
              <div class="bubble">مرحباً، أنا كارينا. كيف يمكنني مساعدتك اليوم؟</div>
            </div>
          </div>

          <div class="composer-area">
            <div class="composer">
              <input id="messageInput" type="text" placeholder="أكتب/ي سؤالك هنا..." />
              <button id="sendBtn">إرسال</button>
            </div>
            <div id="status" class="status"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://website-chat-proxy.nnworkflow02.workers.dev";

    const chatBox = document.getElementById("chatBox");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusEl = document.getElementById("status");

    function addMessage(text, sender) {
      const msg = document.createElement("div");
      msg.className = `message ${sender}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      msg.appendChild(bubble);
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      addMessage(text, "user");
      messageInput.value = "";
      statusEl.textContent = "جارٍ كتابة الرد...";
      sendBtn.disabled = true;
      messageInput.disabled = true;

      try {
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const textResponse = await response.text();
        console.log("RAW RESPONSE:", textResponse);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${textResponse}`);
        }

        let data;
        try {
          data = JSON.parse(textResponse);
        } catch (e) {
          throw new Error("Invalid JSON from server");
        }

        console.log("Full response data:", data);

        let reply = "";

        if (typeof data.reply === "string" && data.reply.trim()) {
          reply = data.reply.trim();
        } else if (typeof data.output === "string" && data.output.trim()) {
          reply = data.output.trim();
        } else if (typeof data.text === "string" && data.text.trim()) {
          reply = data.text.trim();
        } else if (typeof data.n8n_text === "string" && data.n8n_text.trim()) {
          try {
            const nested = JSON.parse(data.n8n_text);
            if (typeof nested.reply === "string" && nested.reply.trim()) {
              reply = nested.reply.trim();
            } else if (typeof nested.output === "string" && nested.output.trim()) {
              reply = nested.output.trim();
            } else if (typeof nested.text === "string" && nested.text.trim()) {
              reply = nested.text.trim();
            }
          } catch (err) {
            reply = data.n8n_text.trim();
          }
        }

        if (reply) {
          addMessage(reply, "bot");
        } else {
          addMessage("لم يتم استلام رد صالح من الخادم.", "bot");
        }

        statusEl.textContent = "";
      } catch (error) {
        console.error(error);
        addMessage("حدث خطأ أثناء الاتصال. يرجى المحاولة مرة أخرى.", "bot");
        statusEl.textContent = "تعذر الاتصال حالياً.";
      } finally {
        sendBtn.disabled = false;
        messageInput.disabled = false;
        messageInput.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    messageInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !sendBtn.disabled) {
        sendMessage();
      }
    });

    document.addEventListener("contextmenu", function(event) {
      event.preventDefault();
    });
  </script>
</body>
</html>
